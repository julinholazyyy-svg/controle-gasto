<!DOCTYPE html>
<html>
<head>
  <title>Controle Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1d2b64, #f8cdda);
      color: white;
    }

    .container {
      max-width: 380px;
      margin: 20px auto;
      background: #111;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #00f2fe;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .top {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #222;
      margin: 5px 0;
      padding: 10px;
      border-radius: 10px;
      animation: aparecer 0.3s ease;
    }

    @keyframes aparecer {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1; transform:translateY(0);}
    }

    .linha {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete {
      background: red;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 5px;
      cursor: pointer;
    }

    .info {
      font-size: 12px;
      opacity: 0.7;
    }

    #msg {
      text-align: center;
      font-size: 12px;
      color: lightgreen;
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="top">
    <span onclick="toggleDark()">🌙 Modo</span>
    <span onclick="limpar()">🧹 Limpar</span>
  </div>

  <h1>💸 Gastos</h1>

  <input id="nome" placeholder="Nome">
  <input id="valor" type="number" placeholder="Valor">

  <select id="categoria">
    <option>Comida</option>
    <option>Transporte</option>
    <option>Lazer</option>
  </select>

  <button onclick="add()">Adicionar</button>

  <div id="msg">✔ Adicionado!</div>

  <ul id="lista"></ul>

  <h3 id="total"></h3>

  <canvas id="grafico"></canvas>

</div>

<script>
let dados = JSON.parse(localStorage.getItem("dados")) || [];

function salvar() {
  localStorage.setItem("dados", JSON.stringify(dados));
}

function add() {
  let nome = document.getElementById("nome").value;
  let valor = Number(document.getElementById("valor").value);
  let categoria = document.getElementById("categoria").value;
  let data = new Date().toLocaleDateString();

  if (!nome || !valor) return alert("Preenche tudo");

  dados.push({nome, valor, categoria, data});
  salvar();
  render();

  document.getElementById("msg").style.display = "block";
  setTimeout(() => {
    document.getElementById("msg").style.display = "none";
  }, 1000);
}

function remover(i) {
  dados.splice(i,1);
  salvar();
  render();
}

function limpar() {
  if (confirm("Apagar tudo?")) {
    dados = [];
    salvar();
    render();
  }
}

function render() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let total = 0;
  let cat = {Comida:0, Transporte:0, Lazer:0};

  dados.forEach((g,i) => {
    let li = document.createElement("li");

    li.innerHTML = `
      <div class="linha">
        <strong>${g.nome} €${g.valor}</strong>
        <button class="delete" onclick="remover(${i})">X</button>
      </div>
      <div class="info">${g.categoria} • ${g.data}</div>
    `;

    lista.appendChild(li);

    total += g.valor;
    cat[g.categoria] += g.valor;
  });

  document.getElementById("total").textContent = "Total: €" + total;

  grafico(cat);
}

let chart;

function grafico(cat) {
  let ctx = document.getElementById("grafico");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: Object.keys(cat),
      datasets: [{
        data: Object.values(cat)
      }]
    }
  });
}

function toggleDark() {
  document.body.style.background =
    document.body.style.background === "black"
    ? "linear-gradient(135deg, #1d2b64, #f8cdda)"
    : "black";
}

render();
</script>

</body>
</html>
