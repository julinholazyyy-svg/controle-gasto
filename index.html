<!DOCTYPE html>
<html>
<head>
  <title>Controle de Gastos</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      margin: 0;
      transition: 0.3s;
    }

    .dark {
      background: #121212;
      color: white;
    }

    .container {
      background: white;
      width: 350px;
      margin: 40px auto;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .dark .container {
      background: #1e1e1e;
    }

    h1 {
      margin-bottom: 10px;
    }

    input, select {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      background: #0077ff;
      color: white;
      border: none;
      padding: 10px;
      width: 95%;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }

    button:hover {
      background: #005fcc;
    }

    .toggle {
      margin-bottom: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    li {
      background: #f1f1f1;
      margin: 5px;
      padding: 10px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: start;
    }

    .dark li {
      background: #2a2a2a;
    }

    .top {
      display: flex;
      justify-content: space-between;
      width: 100%;
    }

    .delete {
      background: red;
      border: none;
      color: white;
      border-radius: 8px;
      padding: 5px 8px;
      cursor: pointer;
    }

    .categoria {
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 6px;
      color: white;
    }

    .comida { background: orange; }
    .transporte { background: purple; }
    .outros { background: gray; }

    .resumo {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="toggle" onclick="modoEscuro()">🌙 Alternar modo</div>

    <h1>💸 Gastos</h1>

    <input type="text" id="nome" placeholder="Nome do gasto">
    <input type="number" id="valor" placeholder="Valor">

    <select id="categoria">
      <option value="comida">Comida</option>
      <option value="transporte">Transporte</option>
      <option value="outros">Outros</option>
    </select>

    <button onclick="adicionar()">Adicionar</button>

    <ul id="lista"></ul>

    <div class="resumo" id="resumo"></div>
  </div>

  <script>
    let gastos = JSON.parse(localStorage.getItem("gastos")) || [];

    function salvar() {
      localStorage.setItem("gastos", JSON.stringify(gastos));
    }

    function atualizarTela() {
      let lista = document.getElementById("lista");
      lista.innerHTML = "";
      let total = 0;

      gastos.forEach((g, index) => {
        let item = document.createElement("li");

        item.innerHTML = `
          <div class="top">
            <strong>${g.nome} - €${g.valor}</strong>
            <button class="delete" onclick="remover(${index})">X</button>
          </div>
          <div>
            <span class="categoria ${g.categoria}">${g.categoria}</span>
            <small>📅 ${g.data}</small>
          </div>
        `;

        lista.appendChild(item);
        total += g.valor;
      });

      document.getElementById("resumo").textContent =
        "Total: €" + total + " | Itens: " + gastos.length;
    }

    function adicionar() {
      let nome = document.getElementById("nome").value;
      let valor = Number(document.getElementById("valor").value);
      let categoria = document.getElementById("categoria").value;

      if (nome === "" || valor === 0) {
        alert("Preenche tudo!");
        return;
      }

      let data = new Date().toLocaleDateString();

      gastos.push({ nome, valor, categoria, data });

      salvar();
      atualizarTela();

      document.getElementById("nome").value = "";
      document.getElementById("valor").value = "";
    }

    function remover(index) {
      gastos.splice(index, 1);
      salvar();
      atualizarTela();
    }

    function modoEscuro() {
      document.body.classList.toggle("dark");
    }

    atualizarTela();
  </script>

</body>
</html>
