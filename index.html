<!DOCTYPE html>
<html>
<head>
  <title>Controle de Gastos</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      margin: 0;
    }

    .container {
      background: white;
      width: 320px;
      margin: 60px auto;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 15px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      background: #ff4d6d;
      color: white;
      border: none;
      padding: 10px;
      width: 95%;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }

    button:hover {
      background: #e63950;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    li {
      background: #f5f5f5;
      margin: 5px;
      padding: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete {
      background: red;
      border: none;
      color: white;
      border-radius: 8px;
      padding: 5px 8px;
      cursor: pointer;
    }

    #total {
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>💸 Gastos</h1>

    <input type="text" id="nome" placeholder="Nome do gasto">
    <input type="number" id="valor" placeholder="Valor">
    <button onclick="adicionar()">Adicionar</button>

    <ul id="lista"></ul>

    <h3 id="total">Total: €0</h3>
  </div>

  <script>
    let gastos = JSON.parse(localStorage.getItem("gastos")) || [];

    function salvar() {
      localStorage.setItem("gastos", JSON.stringify(gastos));
    }

    function atualizarTela() {
      let lista = document.getElementById("lista");
      lista.innerHTML = "";
      let total = 0;

      gastos.forEach((gasto, index) => {
        let item = document.createElement("li");

        item.innerHTML = `
          ${gasto.nome} - €${gasto.valor}
          <button class="delete" onclick="remover(${index})">X</button>
        `;

        lista.appendChild(item);
        total += gasto.valor;
      });

      document.getElementById("total").textContent = "Total: €" + total;
    }

    function adicionar() {
      let nome = document.getElementById("nome").value;
      let valor = Number(document.getElementById("valor").value);

      if (nome === "" || valor === 0) {
        alert("Preenche tudo!");
        return;
      }

      gastos.push({ nome, valor });
      salvar();
      atualizarTela();

      document.getElementById("nome").value = "";
      document.getElementById("valor").value = "";
    }

    function remover(index) {
      gastos.splice(index, 1);
      salvar();
      atualizarTela();
    }

    atualizarTela();
  </script>

</body>
</html>
