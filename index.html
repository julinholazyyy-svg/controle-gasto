<!DOCTYPE html>
<html>
<head>
  <title>Controle Profissional</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(to right, #141e30, #243b55);
      color: white;
    }

    .container {
      max-width: 400px;
      margin: 20px auto;
      background: #1e1e2f;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #00c6ff;
      color: black;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #2c2c3e;
      margin: 5px 0;
      padding: 10px;
      border-radius: 10px;
    }

    canvas {
      margin-top: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="top-bar">
    <span onclick="toggleDark()">🌙 Modo</span>
    <span onclick="limpar()">🧹 Limpar</span>
  </div>

  <h1>💸 Gastos</h1>

  <input id="nome" placeholder="Nome">
  <input id="valor" type="number" placeholder="Valor">

  <select id="categoria">
    <option value="Comida">Comida</option>
    <option value="Transporte">Transporte</option>
    <option value="Lazer">Lazer</option>
  </select>

  <button onclick="add()">Adicionar</button>

  <select id="filtro" onchange="render()">
    <option value="todos">Todos</option>
    <option value="Comida">Comida</option>
    <option value="Transporte">Transporte</option>
    <option value="Lazer">Lazer</option>
  </select>

  <ul id="lista"></ul>

  <h3 id="total"></h3>

  <canvas id="grafico"></canvas>
</div>

<script>
let dados = JSON.parse(localStorage.getItem("dados")) || [];

function salvar() {
  localStorage.setItem("dados", JSON.stringify(dados));
}

function add() {
  let nome = document.getElementById("nome").value;
  let valor = Number(document.getElementById("valor").value);
  let categoria = document.getElementById("categoria").value;

  if (!nome || !valor) return alert("Preenche tudo");

  dados.push({nome, valor, categoria});
  salvar();
  render();
}

function limpar() {
  dados = [];
  salvar();
  render();
}

function render() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let filtro = document.getElementById("filtro").value;

  let total = 0;
  let categorias = {Comida:0, Transporte:0, Lazer:0};

  dados.forEach((g,i) => {
    if (filtro !== "todos" && g.categoria !== filtro) return;

    let li = document.createElement("li");
    li.textContent = g.nome + " €" + g.valor + " ("+g.categoria+")";
    lista.appendChild(li);

    total += g.valor;
    categorias[g.categoria] += g.valor;
  });

  document.getElementById("total").textContent = "Total: €" + total;

  gerarGrafico(categorias);
}

let chart;

function gerarGrafico(cat) {
  let ctx = document.getElementById("grafico");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: Object.keys(cat),
      datasets: [{
        data: Object.values(cat)
      }]
    }
  });
}

function toggleDark() {
  document.body.style.background = document.body.style.background === "black"
    ? "linear-gradient(to right, #141e30, #243b55)"
    : "black";
}

render();
</script>

</body>
</html>
